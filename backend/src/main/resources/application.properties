# ── Server ────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database (Supabase PostgreSQL) ────────────────────────────
# Set DATABASE_URL as env var on Railway (postgres://user:pass@host:5432/db)
# Spring needs the jdbc: prefix version
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-hours=24

# ── Supabase ─────────────────────────────────────────────────
supabase.url=${SUPABASE_URL}
supabase.service-key=${SUPABASE_SERVICE_KEY}

# ── ML Model ─────────────────────────────────────────────────
ml.model-path=${MODEL_PATH:model.onnx}

# ── Content Analysis ─────────────────────────────────────────
# YouTube Data API key (from Google Cloud Console)
youtube.api-key=${YOUTUBE_API_KEY:}
# Anthropic API key (from console.anthropic.com)
anthropic.api-key=${ANTHROPIC_API_KEY:}

# ── Logging ──────────────────────────────────────────────────
logging.level.com.focusos=INFO
logging.level.org.springframework.security=WARN
